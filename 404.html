<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page introuvable · Wladimir Bigand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #09090f;
      --bg2:     #0e0e18;
      --card:    #13131f;
      --border:  #1e1e2e;
      --fg:      #e8e8f0;
      --fg2:     #7878a0;
      --accent:  #a855f7;
      --accent2: #38bdf8;
      --glow:    rgba(168,85,247,.35);
      --head:    'Space Grotesk', sans-serif;
      --body:    'DM Sans', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 24px;
    }

    /* Fond : particules canvas + halos radiaux + grille subtile */
    #particles {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(600px circle at 20% 25%, rgba(168,85,247,.14), transparent 60%),
        radial-gradient(600px circle at 80% 75%, rgba(56,189,248,.10), transparent 60%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 46px 46px;
      opacity: .18;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 75%);
    }

    .wrap {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 620px; width: 100%;
    }

    .tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 12px; letter-spacing: .22em;
      color: var(--accent); text-transform: uppercase;
      border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 16px; margin-bottom: 34px;
      background: rgba(168,85,247,.06);
    }
    .tag .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.7)} }

    /* ─── 404 glitch / néon ─── */
    .glitch {
      font-family: var(--head); font-weight: 700;
      font-size: clamp(96px, 26vw, 240px);
      line-height: .9; letter-spacing: -.02em;
      position: relative; display: inline-block;
      color: var(--fg);
      text-shadow:
        0 0 8px rgba(168,85,247,.55),
        0 0 34px rgba(168,85,247,.35),
        0 0 70px rgba(168,85,247,.18);
      animation: flicker 4.5s infinite;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      background: var(--bg);
      overflow: hidden;
    }
    .glitch::before {
      left: 2px; text-shadow: -2px 0 var(--accent2);
      clip-path: inset(0 0 55% 0);
      animation: glitch-top 3s infinite linear alternate-reverse;
    }
    .glitch::after {
      left: -2px; text-shadow: -2px 0 var(--accent);
      clip-path: inset(55% 0 0 0);
      animation: glitch-bottom 2.4s infinite linear alternate-reverse;
    }
    @keyframes glitch-top {
      0%{transform:translate(0)} 10%{transform:translate(-3px,-2px)}
      20%{transform:translate(4px,2px)} 30%{transform:translate(-2px,1px)}
      40%{transform:translate(3px,-1px)} 50%{transform:translate(0)}
      100%{transform:translate(0)}
    }
    @keyframes glitch-bottom {
      0%{transform:translate(0)} 15%{transform:translate(3px,1px)}
      30%{transform:translate(-4px,-1px)} 45%{transform:translate(2px,2px)}
      60%{transform:translate(-2px,-2px)} 75%{transform:translate(0)}
      100%{transform:translate(0)}
    }
    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
      20%,24%,55% { opacity: .55; }
    }

    .title {
      font-family: var(--head); font-weight: 600;
      font-size: clamp(22px, 5vw, 32px);
      margin-top: 18px; margin-bottom: 12px;
    }
    .title em { color: var(--accent); font-style: normal; }
    .sub {
      color: var(--fg2); font-size: 15px; line-height: 1.7;
      max-width: 440px; margin: 0 auto 38px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      letter-spacing: .05em;
      color: var(--bg); background: var(--accent);
      border: none; border-radius: 6px; cursor: pointer;
      padding: 15px 30px; text-decoration: none;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px var(--glow);
      background: #b366f9;
    }
    .btn svg { width: 17px; height: 17px; }

    .code-line {
      margin-top: 40px;
      font-family: var(--mono); font-size: 12px; color: var(--fg2);
      opacity: .8;
    }
    .code-line .path { color: var(--accent2); }
    .caret {
      display: inline-block; width: 8px; height: 15px;
      background: var(--accent); vertical-align: -2px; margin-left: 3px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    @media (max-width: 600px) {
      .tag { margin-bottom: 24px; }
      body::after { background-size: 34px 34px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .glitch, .glitch::before, .glitch::after,
      .tag .dot, .caret { animation: none !important; }
      .glitch::before, .glitch::after { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <main class="wrap">
    <span class="tag"><span class="dot"></span>Erreur système — 404</span>

    <div class="glitch" data-text="404">404</div>

    <h1 class="title">Page <em>introuvable</em></h1>
    <p class="sub">Il semblerait que vous vous soyez perdu dans le cyberespace. La ressource demandée n'existe pas ou a été déplacée.</p>

    <a class="btn" href="/Portefolio/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>
      Retour à l'accueil
    </a>

    <p class="code-line">$ cd <span class="path">/page/introuvable</span> — no such file or directory<span class="caret"></span></p>
  </main>

  <script>
  /* Champ de particules léger, autonome (aucune dépendance) */
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var canvas = document.getElementById('particles');
    var ctx = canvas.getContext('2d');
    var particles = [], w, h, dpr;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.width = innerWidth * dpr;
      h = canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      var target = Math.min(70, Math.floor(innerWidth / 22));
      particles = [];
      for (var i = 0; i < target; i++) {
        particles.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.25 * dpr,
          vy: (Math.random() - 0.5) * 0.25 * dpr,
          r: (Math.random() * 1.6 + 0.6) * dpr
        });
      }
    }

    function step() {
      ctx.clearRect(0, 0, w, h);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(168,85,247,0.55)';
        ctx.fill();
        // liaisons entre particules proches
        for (var j = i + 1; j < particles.length; j++) {
          var q = particles[j];
          var dx = p.x - q.x, dy = p.y - q.y;
          var dist = dx * dx + dy * dy;
          var max = (120 * dpr) * (120 * dpr);
          if (dist < max) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = 'rgba(168,85,247,' + (0.14 * (1 - dist / max)) + ')';
            ctx.lineWidth = dpr;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(step);
    }

    addEventListener('resize', resize);
    resize();
    step();
  })();
  </script>
</body>
</html>
